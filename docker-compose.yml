services:
  app:
    build:
      context: .
      args:
        # Baked into the React build. Set by run.sh / .env for the real host IP.
        # Production example:
        #   FRONTEND_ENV=REACT_APP_BACKEND_URL=https://match.clinger.dev/api
        FRONTEND_ENV: ${FRONTEND_ENV:-REACT_APP_BACKEND_URL=http://localhost:8080/api}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - ORIGINS=${ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      - DB_NAME=${DB_NAME:-shooting_matches_db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-long-random-string}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  mongodb:
    # Pin to 7.0 — mongo:latest (8.x) has segfaulted (exit 139) in small LXCs.
    image: mongo:7.0
    command:
      - --wiredTigerCacheSizeGB
      - "0.25"
    # Only expose Mongo on the host loopback (app talks over the compose network).
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
